_schema-version: 3.3.0
ID: SupplyLens
description: A simple CAP project.
version: 1.0.0
modules:
- name: SupplyLens-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: SupplyLens-db
  - name: SupplyLens-connectivity
  - name: SupplyLens-destination
  - name: uaa_SupplyLens
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: SupplyLens-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: SupplyLens-db
  parameters:
    buildpack: nodejs_buildpack
- name: SupplyLens-destination-content
  type: com.sap.application.content
  requires:
  - name: SupplyLens-destination
    parameters:
      content-target: true
  - name: SupplyLens_html_repo_host
    parameters:
      service-key:
        name: SupplyLens_html_repo_host-key
  - name: uaa_SupplyLens
    parameters:
      service-key:
        name: uaa_SupplyLens-key
  parameters:
    content:
      instance:
        destinations:
        - Name: approut_SupplyLens_html_repo_host
          ServiceInstanceName: SupplyLens-html5-app-host-service
          ServiceKeyName: SupplyLens_html_repo_host-key
          sap.cloud.service: approut
        - Authentication: OAuth2UserTokenExchange
          Name: approut_uaa_SupplyLens
          ServiceInstanceName: SupplyLens-xsuaa-service
          ServiceKeyName: uaa_SupplyLens-key
          sap.cloud.service: approut
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: SupplyLens-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: SupplyLens_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - sravanbristleconesupplylensui.zip
      name: sravanbristleconesupplylensui
      target-path: resources/
- name: sravanbristleconesupplylensui
  type: html5
  path: app/supplylensui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: SupplyLens-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: SupplyLens-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite
- name: SupplyLens-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api
- name: SupplyLens_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: SupplyLens-html5-app-host-service
    service-plan: app-host
- name: uaa_SupplyLens
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: SupplyLens-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-name: SupplyLens-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
